# ========================
# SERVER CONFIGURATION
# ========================
server.port=${PORT:8080}

# ========================
# DATABASE CONFIGURATION
# ========================
# Uses environment variables on Railway, falls back to local MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/banking_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:your_password_here}

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=${JWT_SECRET:MyBankingSystemSuperSecretKeyThatIsAtLeast256BitsLong!}
jwt.expiration=86400000

# ========================
# CORS (allow React frontend)
# ========================
# Handled in SecurityConfig.java
